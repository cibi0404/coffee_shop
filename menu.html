<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coffee House</title>
  <link rel="stylesheet" href="./menu.css" />
</head>
<body>

  <!-- MENU SECTION -->
  <section class="menu-section">

    <!-- TOP PART - beige background -->
    <div class="menu-top">
      <h2>OUR MENU</h2>
      <div class="divider">
        <hr />
        <span>&#9749;</span>
        <hr />
      </div>

      <!-- FILTER TABS -->
      <div class="tabs" id="tabs">
        <button class="tab-btn active" data-cat="All">All</button>
        <button class="tab-btn" data-cat="Coffee">Coffee</button>
        <button class="tab-btn" data-cat="Hot Drinks">Hot Drinks</button>
        <button class="tab-btn" data-cat="Cold Drinks">Cold Drinks</button>
        <button class="tab-btn" data-cat="Food">Food</button>
        <button class="tab-btn" data-cat="Desserts">Desserts</button>
      </div>
    </div>

    <!-- BOTTOM PART - dark brown background -->
    <div class="menu-bottom">
      <div class="grid" id="grid"></div>
    </div>

  </section>

  <script src="./menu.js"></script>
</body>
</html>
