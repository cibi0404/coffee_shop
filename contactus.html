<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Section</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="contact-section">
        <div class="contact-container">
            <!-- Left Side -->
            <div class="contact-info">
                <h2>CONTACT US</h2>
                <h3 class="subtitle">We'd love to hear from you</h3>

                <div class="info-items">
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <p>
                            123 Coffee House St,<br>
                            Brew Town, CA 90210, USA
                        </p>
                    </div>

                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <p>+1 234 567 8900</p>
                    </div>

                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <p>info@coffeehouse.com</p>
                    </div>

                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <p>Mon - Sun: 8:00 AM - 10:00 PM</p>
                    </div>
                </div>

                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-reddit-alien"></i></a>
                </div>
            </div>

            <!-- Center Form -->
            <div class="contact-form-container">
                <div class="contact-form">
                    <form>
                        <div class="form-row">
                            <input type="text" placeholder="Your Name">
                            <input type="email" placeholder="Your Email">
                        </div>
                        <div class="form-row">
                            <input type="text" placeholder="Subject">
                        </div>
                        <div class="form-row">
                            <textarea placeholder="Your Message"></textarea>
                        </div>
                        <div class="form-row">
                            <button type="submit" class="submit-btn">
                                Send Message
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Map -->
            <div class="contact-map">
                <iframe class="map"
                    src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d51130.366654562626!2d-119.41776299999998!3d36.779013!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb9fe5f285e3d%3A0x8b5109a227086f55!2sCalifornia!5e0!3m2!1sen!2sus!4v1781893975348!5m2!1sen!2sus"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </section>

</body>
</html>
